<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TerraTracker</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 80px);
            padding: 2rem;
        }

        .login-card {
            width: 100%;
            max-width: 450px;
            padding: 3rem 2.5rem;
            text-align: center;
        }

        .login-card-header h2 {
            font-size: 2rem;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .login-card-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 2.5rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .action-buttons .btn {
            flex: 1;
            padding: 0.8rem;
            font-size: 1rem;
            border-radius: 8px;
        }

        .navbar-login {
            justify-content: space-between;
        }

        select#language-switcher {
            border: none;
            background: transparent;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            outline: none;
            padding-right: 0.5rem;
            width: auto;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-login">
        <a href="index.html" class="nav-brand">
            <img src="Logo.jpeg" alt="TerraTracker Logo">
            <span>TerraTracker</span>
        </a>
        <div class="nav-actions">
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
                <i class="fa-solid fa-moon"></i>
            </button>
            <div class="custom-select badge">
                <select id="language-switcher">
                    <option value="en">English</option>
                    <option value="hi">हिंदी</option>
                    <option value="te">తెలుగు</option>
                </select>
            </div>
        </div>
    </nav>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

    <!-- YOUR CONFIG -->
    <script src="firebase-config.js"></script>
    <main class="login-page animate-fade-in">
        <div class="card login-card">
            <div class="login-card-header">
                <h2 data-i18n="login_title">Login</h2>
                <p data-i18n="login_subtitle">Access your field data</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label data-i18n="label_email">Email ID</label>
                    <div class="input-group">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" placeholder="example@email.com">
                    </div>
                </div>

                <div class="form-group">
                    <label data-i18n="label_password">Password</label>
                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" placeholder="••••••••">
                    </div>
                </div>

                <div class="form-group">
                    <label data-i18n="label_phone">Phone Number</label>
                    <div class="input-group">
                        <i class="fa-solid fa-phone"></i>
                        <input type="tel" id="login-phone" placeholder="+1 234 567 8900" required>
                    </div>
                </div>

                <div class="action-buttons">
                    <button type="submit" class="btn btn-primary-green">
                        <i class="fa-solid fa-arrow-right-to-bracket"></i> <span data-i18n="btn_login">Login</span>
                    </button>
                    <button type="button" class="btn btn-primary-orange" onclick="window.location.href='signup.html'">
                        <i class="fa-solid fa-user-plus"></i> <span data-i18n="btn_signup">Sign Up</span>
                    </button>
                </div>
            </form>
        </div>
    </main>
    <script>
        document.querySelector("form").addEventListener("submit", async function (e) {
            e.preventDefault();

            const email = document.querySelector("input[type='email']").value.trim();
            const password = document.querySelector("input[type='password']").value;
            const phone = document.getElementById("login-phone").value.trim();

            try {
                window.isLoggingIn = true;
                // 1. Log in with Firebase Auth (Email/Password)
                const userCred = await auth.signInWithEmailAndPassword(email, password);
                const uid = userCred.user.uid;

                // 2. Fetch the user profile from Firebase to verify Phone Number
                const snapshot = await database.ref("users/" + uid + "/profile").once("value");
                const profileData = snapshot.val();

                if (profileData && profileData.phone && profileData.phone !== phone) {
                    // Phone number mismatch
                    await auth.signOut();
                    alert("The entered phone number does not match our records for this account.");
                    return;
                }

                localStorage.setItem("farmLocation", "farm1");
                window.location.href = "dashboard.html";

            } catch (err) {
                alert(err.message);
                console.error(err);
            }
        });
    </script>

    <script src="translations.js"></script>
    <script src="script.js"></script>
</body>

</html>
